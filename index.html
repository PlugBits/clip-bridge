<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipBridge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --accent: #5b7fff; --green: #3ecf8e; --red: #f04444;
    --text: #e8eaf0; --muted: #6b7280; --border: #2a2e42;
    --radius: 12px; --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 48px;
  }
  header {
    width: 100%; max-width: 560px; display: flex;
    align-items: center; gap: 10px; margin-bottom: 32px;
  }
  .logo {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .tagline { font-size: 12px; color: var(--muted); margin-left: auto; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    width: 100%; max-width: 560px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }
  .btn {
    border: none; border-radius: 8px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger  { background: #2a1a1a; color: var(--red); border: 1px solid #4a2020; }

  /* 接続 */
  .room-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .room-id {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 22px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.12em; text-align: center;
    cursor: pointer; user-select: all;
  }
  .join-row { display: flex; gap: 8px; }
  .join-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 20px; font-weight: 700;
    color: var(--text); letter-spacing: 0.12em; text-align: center; outline: none;
  }
  .join-input:focus { border-color: var(--accent); }
  .join-input::placeholder { color: var(--muted); font-size: 14px; font-weight: 400; letter-spacing: 0; }
  .status-bar {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: var(--surface2); border-radius: 8px; font-size: 13px; margin-top: 12px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.waiting { background: var(--accent); animation: pulse 1.5s infinite; }
  .dot.error   { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* タブ */
  .tab-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab-row .btn { flex: 1; padding: 8px; }

  /* ドロップゾーン */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 28px 20px;
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    min-height: 120px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
  }
  .drop-zone.active { border-color: var(--accent); background: rgba(91,127,255,0.06); }
  .drop-zone.has-content { border-color: var(--green); background: rgba(62,207,142,0.04); }
  .drop-icon { font-size: 32px; }
  .drop-hint { font-size: 13px; color: var(--muted); }
  .drop-hint strong { color: var(--text); }

  #paste-trap { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }

  #preview-wrap { display: none; margin-top: 12px; }
  #preview-img { max-width: 100%; max-height: 240px; border-radius: 8px; object-fit: contain; border: 1px solid var(--border); display: none; }
  #preview-text { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; display: none; }
  .send-row { display: flex; gap: 8px; margin-top: 12px; }

  #direct-input {
    width: 100%; min-height: 100px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; font-size: 14px; color: var(--text);
    resize: vertical; outline: none; font-family: var(--font); line-height: 1.6;
  }
  #direct-input:focus { border-color: var(--accent); }

  .receive-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px; }
  .received-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .received-item img { max-width: 100%; max-height: 320px; border-radius: 6px; object-fit: contain; display: block; cursor: pointer; }
  .item-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }
  .item-time { font-size: 11px; color: var(--muted); }
  .received-text { font-size: 14px; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }

  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 20px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok  { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red);   color: var(--red); }
</style>
</head>
<body>

<textarea id="paste-trap"></textarea>

<header>
  <div class="logo">📋</div>
  <h1>ClipBridge</h1>
  <span class="tagline">iPad ↔ Windows</span>
</header>

<!-- 接続カード -->
<div class="card">
  <div class="card-title">ルーム</div>
  <div class="room-row">
    <div class="room-id" id="my-room" title="タップでコピー">----</div>
    <button class="btn btn-ghost" onclick="copyRoomId()">IDコピー</button>
  </div>
  <div class="join-row">
    <input class="join-input" id="room-input" placeholder="ルームID（4桁）" maxlength="4" inputmode="numeric">
    <button class="btn btn-primary" onclick="joinRoom()">参加</button>
  </div>
  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">準備中...</span>
  </div>
</div>

<!-- 送信カード -->
<div class="card">
  <div class="card-title">送信</div>
  <div class="tab-row">
    <button class="btn btn-primary" id="tab-paste" onclick="switchTab('paste')">📋 ペースト</button>
    <button class="btn btn-ghost"   id="tab-text"  onclick="switchTab('text')">⌨️ テキスト入力</button>
  </div>

  <div id="pane-paste">
    <div class="drop-zone" id="drop-zone"
      onclick="focusPasteTrap()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)">
      <div class="drop-icon">📤</div>
      <div class="drop-hint" id="drop-hint"><strong>クリック → Ctrl+V</strong> または画像をドロップ</div>
      <div class="drop-hint" style="font-size:11px">iOS: 写真をコピー後ここをタップ →「ペースト」</div>
    </div>
  </div>

  <div id="pane-text" style="display:none">
    <textarea id="direct-input" placeholder="ここに直接入力..." oninput="onDirectInput()"></textarea>
  </div>

  <div id="preview-wrap">
    <img id="preview-img">
    <div id="preview-text"></div>
  </div>
  <div class="send-row">
    <button class="btn btn-primary" id="btn-send" onclick="sendContent()" disabled>送信</button>
    <button class="btn btn-ghost" onclick="clearContent()">クリア</button>
  </div>
</div>

<!-- 受信カード -->
<div class="card">
  <div class="card-title">受信</div>
  <div id="receive-list">
    <div class="receive-empty">まだ受信していません</div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://ahrvesmafltdkrcjqfwh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFocnZlc21hZmx0ZGtyY2pxZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDU0MzUsImV4cCI6MjA5ODMyMTQzNX0.omwTTulKmH9WyRgo4AGVKEoAv1f3fzKesSudMFrafRo';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let channel = null;
let currentRoom = null;
let pendingData = null;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

// ---- ルーム ----
function genRoomId() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

window.addEventListener('load', () => {
  const id = genRoomId();
  document.getElementById('my-room').textContent = id;
  setStatus('waiting', 'ルームIDを相手に伝えるか、相手のIDで参加してください');
});

function joinRoom() {
  const roomId = document.getElementById('room-input').value.trim() || document.getElementById('my-room').textContent;
  if (!roomId || roomId.length !== 4) { toast('4桁のルームIDを入力してください', 'err'); return; }
  if (channel) { channel.unsubscribe(); channel = null; }
  currentRoom = roomId;
  setStatus('waiting', '接続中...');

  channel = sb.channel('clip-' + roomId, {
    config: { broadcast: { self: false } }
  });

  channel.on('broadcast', { event: 'clip' }, ({ payload }) => {
    receiveContent(payload);
  });

  channel.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      setStatus('online', 'ルーム ' + roomId + ' に参加中');
      document.getElementById('btn-send').disabled = (pendingData === null);
      toast('接続しました ✓', 'ok');
    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
      setStatus('error', '切断されました');
      toast('切断されました', 'err');
    }
  });
}

// 自分のIDで自動参加
window.addEventListener('load', () => {
  setTimeout(() => {
    const myId = document.getElementById('my-room').textContent;
    document.getElementById('room-input').value = myId;
    joinRoom();
  }, 300);
});

// 画面復帰時に再接続
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && currentRoom) {
    if (!channel || channel.state !== 'joined') {
      setStatus('waiting', '再接続中...');
      joinRoom();
    }
  }
});

function copyRoomId() {
  const id = document.getElementById('my-room').textContent;
  navigator.clipboard.writeText(id);
  toast('ルームIDをコピーしました', 'ok');
}

// ---- ペースト ----
const pasteTrap = document.getElementById('paste-trap');
pasteTrap.addEventListener('paste', (e) => {
  e.preventDefault();
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (ev) => setPreview('image', ev.target.result);
      reader.readAsDataURL(item.getAsFile());
      return;
    }
  }
  const text = e.clipboardData.getData('text');
  if (text) setPreview('text', text);
  else toast('テキストか画像をコピーしてペーストしてください', 'err');
});

function focusPasteTrap() {
  pasteTrap.value = '';
  pasteTrap.focus();
  document.getElementById('drop-zone').classList.add('active');
  document.getElementById('drop-hint').innerHTML = '<strong>Ctrl+V を押してください</strong>（iOS: 長押し → ペースト）';
  pasteTrap.onblur = () => {
    document.getElementById('drop-zone').classList.remove('active');
    if (!pendingData) document.getElementById('drop-hint').innerHTML = '<strong>クリック → Ctrl+V</strong> または画像をドロップ';
  };
}

function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('active'); }
function onDragLeave()  { document.getElementById('drop-zone').classList.remove('active'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => setPreview('image', ev.target.result);
    reader.readAsDataURL(file);
  } else {
    const text = e.dataTransfer.getData('text');
    if (text) setPreview('text', text);
  }
}

function setPreview(type, data) {
  pendingData = { type, data };
  document.getElementById('drop-zone').classList.add('has-content');
  document.getElementById('drop-hint').innerHTML = type === 'image' ? '📷 画像をペースト済み' : '📝 テキストをペースト済み';
  document.getElementById('preview-wrap').style.display = '';
  document.getElementById('preview-img').style.display  = type === 'image' ? 'block' : 'none';
  document.getElementById('preview-text').style.display = type === 'text'  ? 'block' : 'none';
  if (type === 'image') document.getElementById('preview-img').src = data;
  else document.getElementById('preview-text').textContent = data;
  document.getElementById('btn-send').disabled = false;
}

function clearContent() {
  pendingData = null;
  document.getElementById('drop-zone').classList.remove('has-content', 'active');
  document.getElementById('drop-hint').innerHTML = '<strong>クリック → Ctrl+V</strong> または画像をドロップ';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-text').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('preview-text').textContent = '';
  document.getElementById('btn-send').disabled = true;
}

// ---- タブ ----
function switchTab(tab) {
  document.getElementById('pane-paste').style.display = tab === 'paste' ? '' : 'none';
  document.getElementById('pane-text').style.display  = tab === 'text'  ? '' : 'none';
  document.getElementById('tab-paste').className = 'btn ' + (tab === 'paste' ? 'btn-primary' : 'btn-ghost');
  document.getElementById('tab-text').className  = 'btn ' + (tab === 'text'  ? 'btn-primary' : 'btn-ghost');
  if (tab === 'text') clearContent();
  if (tab === 'paste') { document.getElementById('direct-input').value = ''; pendingData = null; document.getElementById('btn-send').disabled = true; }
}

function onDirectInput() {
  const val = document.getElementById('direct-input').value;
  pendingData = val.trim() ? { type: 'text', data: val } : null;
  document.getElementById('btn-send').disabled = !pendingData;
}

// ---- 送信 ----
async function sendContent() {
  if (!channel) { toast('ルームに参加していません', 'err'); return; }
  if (!pendingData) { toast('送信するデータがありません', 'err'); return; }
  await channel.send({ type: 'broadcast', event: 'clip', payload: pendingData });
  toast('送信しました ✓', 'ok');
  clearContent();
  if (document.getElementById('pane-text').style.display !== 'none') {
    document.getElementById('direct-input').value = '';
  }
}

// ---- 受信 ----
function receiveContent(data) {
  const list = document.getElementById('receive-list');
  const empty = list.querySelector('.receive-empty');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'received-item';
  const time = new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  if (data.type === 'image') {
    const img = document.createElement('img');
    img.src = data.data;
    item.appendChild(img);
  } else {
    const p = document.createElement('div');
    p.className = 'received-text';
    p.textContent = data.data;
    item.appendChild(p);
  }

  const meta = document.createElement('div');
  meta.className = 'item-meta';
  meta.innerHTML = `<span class="item-time">${time}</span>`;

  const actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:6px;';
  const s = 'padding:6px 12px;font-size:12px;';

  if (data.type === 'text') {
    actions.appendChild(mkBtn('コピー', 'btn-ghost', s, () => { navigator.clipboard.writeText(data.data); toast('コピーしました ✓', 'ok'); }));
  } else {
    if (!isIOS) actions.appendChild(mkBtn('コピー', 'btn-ghost', s, () => copyImage(data.data)));
    actions.appendChild(mkBtn('DL', 'btn-primary', s, () => downloadImage(data.data)));
  }
  actions.appendChild(mkBtn('削除', 'btn-danger', s, () => item.remove()));

  meta.appendChild(actions);
  item.appendChild(meta);
  list.prepend(item);
  toast(data.type === 'image' ? '画像を受信しました 📷' : 'テキストを受信しました', 'ok');
}

function mkBtn(label, cls, style, fn) {
  const b = document.createElement('button');
  b.className = 'btn ' + cls; b.style.cssText = style; b.textContent = label; b.onclick = fn;
  return b;
}

async function copyImage(src) {
  try {
    const img = new Image(); img.src = src;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast('画像をコピーしました ✓', 'ok');
      } catch { toast('コピー不可。DLを使ってください', 'err'); }
    }, 'image/png');
  } catch { toast('コピー不可。DLを使ってください', 'err'); }
}

function downloadImage(src) {
  const a = document.createElement('a');
  a.href = src; a.download = 'clip-' + Date.now() + '.png'; a.click();
}

// ---- UI ----
function setStatus(state, text) {
  document.getElementById('status-dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}
let toastTimer = null;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}
</script>
</body>
</html>
